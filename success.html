<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checking Your Account | STRIVE INDEPENDENCE</title>
<meta name="description" content="Checking STRIVE INDEPENDENCE account access after checkout.">
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#132338;
  --ink:#1a2e44;
  --muted:rgba(26,46,68,.68);
  --blue:#1b4fa8;
  --orange:#f5820a;
  --paper:#f6fafc;
  --line:rgba(19,35,56,.12);
}
body{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:24px;
  font-family:"Outfit",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(ellipse 72% 44% at 50% -10%,rgba(27,79,168,.15),transparent 62%),
    radial-gradient(ellipse 42% 34% at 94% 15%,rgba(245,130,10,.14),transparent 58%),
    var(--paper);
}
.card{
  width:min(100%,520px);
  padding:clamp(28px,6vw,46px);
  text-align:center;
  background:rgba(255,255,255,.88);
  border:1px solid var(--line);
  border-radius:10px;
  box-shadow:0 28px 80px rgba(19,35,56,.12);
}
.brand{
  display:inline-flex;
  align-items:center;
  gap:10px;
  margin-bottom:26px;
  color:var(--navy);
  text-decoration:none;
}
.brand:hover,.brand:focus{text-decoration:none}
.brand img{width:42px;height:42px;object-fit:contain}
.brand-text{line-height:1;text-align:left}
.brand-main{display:block;font-size:20px;font-weight:900;letter-spacing:.09em;text-transform:uppercase}
.brand-sub{display:block;margin-top:2px;font-size:8px;font-weight:800;letter-spacing:.24em;color:var(--orange);text-transform:uppercase}
h1{
  color:var(--navy);
  font-size:clamp(2rem,7vw,3.1rem);
  font-weight:900;
  line-height:.98;
  letter-spacing:0;
  text-transform:uppercase;
  margin-bottom:14px;
}
#statusMessage{
  color:var(--muted);
  font-size:1.03rem;
  line-height:1.58;
  margin:0 auto 24px;
  max-width:420px;
}
.spinner{
  width:48px;
  height:48px;
  margin:8px auto 24px;
  border:4px solid rgba(27,79,168,.12);
  border-top-color:var(--orange);
  border-radius:50%;
  animation:spin .85s linear infinite;
}
.spinner.hidden{display:none}
.action{
  display:none;
  align-items:center;
  justify-content:center;
  width:100%;
  min-height:48px;
  padding:13px 18px;
  border:0;
  border-radius:6px;
  background:var(--orange);
  color:var(--navy);
  font:inherit;
  font-size:12px;
  font-weight:900;
  letter-spacing:.13em;
  text-transform:uppercase;
  cursor:pointer;
  text-decoration:none;
}
.action.show{display:inline-flex}
.note{
  margin-top:18px;
  color:rgba(26,46,68,.46);
  font-size:.84rem;
  line-height:1.45;
}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:520px){
  body{padding:18px}
  .card{padding:28px 20px}
  .brand{margin-bottom:22px}
}
</style>
</head>
<body>
<main class="card" aria-live="polite">
  <a class="brand" href="/index.html" aria-label="STRIVE INDEPENDENCE home">
    <img src="./logo.png" alt="">
    <span class="brand-text">
      <span class="brand-main">STRIVE</span>
      <span class="brand-sub">Independence</span>
    </span>
  </a>

  <h1 id="statusTitle">Checking your account</h1>
  <div class="spinner" id="spinner" aria-hidden="true"></div>
  <p id="statusMessage">We are confirming whether your STRIVE INDEPENDENCE access is active.</p>
  <a class="action" id="loginButton" href="auth.html">Log in again</a>
  <button class="action" id="refreshButton" type="button">Click here if this page does not redirect you</button>
  <p class="note">Access is confirmed from your account record. This page does not grant access.</p>
</main>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://ccfpdgmmwkghjszkbnzs.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNjZnBkZ21td2tnaGpzemtibnpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NzM4MjYsImV4cCI6MjA5NjQ0OTgyNn0.c2ocYnK9bvQo4uTJtxXbjk6KdizCI_vaNDCt0HFYXuk";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const PLAN_PAGE = "choose-plan.html";
const TEAM_ACCESS_REMOVED_PAGE = PLAN_PAGE + "?reason=team_access_removed";

const statusTitle = document.getElementById("statusTitle");
const statusMessage = document.getElementById("statusMessage");
const spinner = document.getElementById("spinner");
const loginButton = document.getElementById("loginButton");
const refreshButton = document.getElementById("refreshButton");

refreshButton.addEventListener("click", () => {
  window.location.href = "dashboard.html";
});

function stopLoading() {
  spinner.classList.add("hidden");
}

function showLoginNeeded() {
  stopLoading();
  statusTitle.textContent = "Please log in again";
  statusMessage.textContent = "Please log in again. Your payment may have worked, but we need you to log in so we can connect your account.";
  loginButton.classList.add("show");
}

function showStillActivating() {
  stopLoading();
  statusTitle.textContent = "Checking your access";
  statusMessage.textContent = "Still activating your account.";
  refreshButton.classList.add("show");
}

function showQueryError(message) {
  stopLoading();
  statusTitle.textContent = "Checking your access";
  statusMessage.textContent = message || "Still checking your account.";
  refreshButton.classList.add("show");
}

function showAccessConfirmed() {
  stopLoading();
  statusTitle.textContent = "Access confirmed";
  statusMessage.textContent = "Access confirmed. Taking you to your dashboard.";
  window.setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 900);
}

async function checkAccess() {
  const { data: userData, error: userError } = await supabase.auth.getUser();
  const user = userData && userData.user;
  console.log("Supabase user id:", user ? user.id : null);
  console.log("Supabase user email:", user ? user.email : null);

  if (userError || !user) {
    showLoginNeeded();
    return;
  }

  const { data: profile, error: profileError } = await supabase
    .from("profile")
    .select("has_access, user_id, access_type, trial_ends_at")
    .eq("user_id", user.id)
    .single();

  console.log("Profile result:", profile);
  console.log("Profile error:", profileError);

  if (profileError) {
    showQueryError(profileError.message);
    return;
  }

  console.log("Profile access type:", profile?.access_type);

  if (profile?.access_type === "team") {
    console.log("Checking active team membership for user:", user.id);

    const { data: membership, error: membershipError } = await supabase
      .from("members")
      .select("team_id, role")
      .eq("user_id", user.id)
      .limit(1)
      .maybeSingle();

    if (membershipError) {
      console.error("Team membership check failed:", membershipError.message);
      showQueryError(membershipError.message);
      return;
    }

    if (!membership) {
      console.warn("Team access removed; sending user to plan selection:", user.id);
      window.location.href = TEAM_ACCESS_REMOVED_PAGE;
      return;
    }

    console.log("Team membership active:", membership.team_id, membership.role);
    showAccessConfirmed();
    return;
  }

  if (profile?.access_type === "removed_team") {
    window.location.href = TEAM_ACCESS_REMOVED_PAGE;
    return;
  }

  const trialEndsAt = profile?.trial_ends_at ? new Date(profile.trial_ends_at) : null;
  const trialActive = profile?.access_type === "trial" && trialEndsAt && trialEndsAt > new Date();
  const paidActive = profile?.access_type === "paid" && profile.has_access === true;

  if (trialActive || paidActive) {
    showAccessConfirmed();
    return;
  }

  window.location.href = PLAN_PAGE;
}

checkAccess().catch(() => {
  showQueryError("Unexpected error while checking your account.");
});
</script>
</body>
</html>
