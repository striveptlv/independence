<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Reference | Las Vegas School District Credit Union</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
        color: #132033;
        background: linear-gradient(180deg, #f6f8fb 0%, #e8eef5 100%);
      }

      .card {
        width: min(100%, 560px);
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(19, 32, 51, 0.12);
        box-shadow: 0 20px 44px rgba(16, 34, 56, 0.12);
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 0.78rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #5e6c7f;
      }

      h1,
      p {
        margin-top: 0;
      }

      .hint {
        margin-top: 18px;
        padding: 16px 18px;
        border-radius: 18px;
        background: rgba(22, 80, 143, 0.08);
        border: 1px solid rgba(22, 80, 143, 0.12);
      }

      .site-credit {
        margin-top: 22px;
        text-align: center;
        font-size: 0.82rem;
        color: #6f7c8d;
      }
    </style>
<script type="module" data-strive-access-guard>
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://ccfpdgmmwkghjszkbnzs.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_7Je2n19DYuDUUR-l9DQPCQ_ui1S17Ui";

const AUTH_URL = "https://independence.striveptlv.com/auth.html";
const PLAN_URL = "https://independence.striveptlv.com/choose-plan.html";
const TEAM_ACCESS_REMOVED_URL = PLAN_URL + "?reason=team_access_removed";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function checkStriveAccess() {
  const { data: { user }, error: userError } = await supabase.auth.getUser();

  if (userError || !user) {
    window.location.replace(AUTH_URL);
    return;
  }

  const { data: profile, error: profileError } = await supabase
    .from("profile")
    .select("has_access, access_type, trial_ends_at")
    .eq("user_id", user.id)
    .single();

  if (profileError || !profile) {
    console.error("Profile fetch failed:", profileError?.message);
    window.location.replace(AUTH_URL);
    return;
  }

  if (profile.access_type === "team") {
    const { data: membership, error: membershipError } = await supabase
      .from("members")
      .select("team_id, role")
      .eq("user_id", user.id)
      .limit(1)
      .maybeSingle();

    if (membershipError) {
      console.error("Team membership check failed:", membershipError.message);
      window.location.replace(PLAN_URL);
      return;
    }

    if (!membership) {
      window.location.replace(TEAM_ACCESS_REMOVED_URL);
      return;
    }

    return;
  }

  if (profile.access_type === "removed_team") {
    window.location.replace(TEAM_ACCESS_REMOVED_URL);
    return;
  }

  const now = new Date();
  const trialEndsAt = profile.trial_ends_at ? new Date(profile.trial_ends_at) : null;

  const trialActive =
    profile.access_type === "trial" &&
    trialEndsAt &&
    trialEndsAt > now;

  const paidActive =
    profile.access_type === "paid" &&
    profile.has_access === true;

  const adminActive =
    profile.access_type === "admin" &&
    profile.has_access === true;

  if (!(trialActive || paidActive || adminActive)) {
    window.location.replace(PLAN_URL);
  }
}

checkStriveAccess().catch((error) => {
  console.error("Access check failed:", error);
  window.location.replace(AUTH_URL);
});
</script>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Hard And Realistic Password Reference</p>
      <h1>Password Helper</h1>
      <p>Use this page only when the hard or realistic login asks you to look up the password separately.</p>
      <div class="hint">
        <strong>Password:</strong> Therapy
      </div>
      <p class="site-credit">STRIVE Independence by STRIVE Physical Therapy - Las Vegas</p>
    </main>
  </body>
</html>
