<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Password | STRIVE INDEPENDENCE</title>
<meta name="description" content="Update your STRIVE INDEPENDENCE account password.">
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#132338;
  --ink:#1a2e44;
  --muted:rgba(26,46,68,.62);
  --soft:rgba(26,46,68,.78);
  --blue:#1B4FA8;
  --orange:#F5820A;
  --line:rgba(19,35,56,.12);
  --white:#fff;
}
html{scroll-behavior:smooth}
body{
  min-height:100vh;font-family:'Outfit',sans-serif;color:var(--ink);
  background:#f5fafc;line-height:1.6;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 42% at 50% -10%,rgba(27,79,168,.14),transparent 64%),
    radial-gradient(ellipse 36% 34% at 95% 22%,rgba(245,130,10,.14),transparent 60%),
    radial-gradient(ellipse 44% 34% at 4% 82%,rgba(27,79,168,.08),transparent 58%),
    linear-gradient(105deg,rgba(245,250,252,.97) 0%,rgba(245,250,252,.9) 46%,rgba(245,250,252,.96) 100%),
    url('pexels/pexels-vlada-karpovich-5790828.jpg');
  background-position:center,center,center,center,34% 28%;
  background-size:auto,auto,auto,auto,cover;
}
main,footer{position:relative;z-index:1}
a{color:inherit}
.shell{width:min(1180px,88vw);margin:0 auto}
.hero{
  min-height:100vh;display:grid;grid-template-columns:.9fr 1.1fr;
  gap:48px;align-content:center;align-items:center;justify-items:stretch;padding:54px 0;
}
h1{
  max-width:560px;font-size:clamp(2.8rem,4.4vw,4.65rem);font-weight:900;line-height:.94;
  letter-spacing:0;text-transform:uppercase;color:var(--navy);margin:0;
}
h1 span{display:block}
h1 em{font-style:normal;color:var(--orange)}
.hero-subhead{
  max-width:540px;margin-top:22px;color:var(--soft);font-size:clamp(1.05rem,1.45vw,1.28rem);
  line-height:1.55;font-weight:600;
}
.hero-subhead.primary-copy{color:var(--navy);font-weight:700}
.hero-subhead.secondary-copy{margin-top:10px;color:var(--orange)}
.auth-card{
  width:min(100%,620px);
  justify-self:end;
  background:linear-gradient(145deg,rgba(255,255,255,.34),rgba(235,246,251,.12));
  border:1px solid rgba(255,255,255,.34);border-radius:20px;
  padding:clamp(1.35rem,3.4vw,2.3rem);
  -webkit-backdrop-filter:blur(30px) saturate(180%);
  backdrop-filter:blur(30px) saturate(180%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 34px 92px rgba(19,35,56,.08);
}
.card-kicker{
  font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.2em;
  text-transform:uppercase;color:var(--orange);margin-bottom:10px;
}
.card-title{
  font-size:clamp(1.65rem,3vw,2.35rem);font-weight:900;letter-spacing:0;
  line-height:1;text-transform:uppercase;color:var(--navy);margin-bottom:12px;
}
.card-copy{font-size:.98rem;color:var(--soft);line-height:1.62;margin-bottom:20px}
.auth-form{display:grid;gap:16px}
.field{display:grid;gap:9px}
label{
  font-family:'DM Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--orange);
}
input{
  width:100%;min-height:56px;border-radius:10px;border:1px solid rgba(19,35,56,.14);
  background:rgba(255,255,255,.62);color:var(--navy);font:inherit;font-size:1.08rem;padding:0 16px;
}
input:focus{outline:none;border-color:rgba(245,130,10,.58);box-shadow:0 0 0 4px rgba(245,130,10,.1)}
.button-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
button,.button{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:48px;
  padding:13px 20px;border-radius:6px;border:none;text-decoration:none;cursor:pointer;
  font-size:12.5px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;
  transition:opacity .2s,transform .2s,box-shadow .2s;
}
button:hover,.button:hover{opacity:.92;transform:translateY(-1px)}
button:disabled{opacity:.58;cursor:wait;transform:none}
.primary{background:var(--orange);color:var(--navy);box-shadow:0 14px 34px rgba(245,130,10,.22)}
.form-link{
  justify-self:start;border:0;background:transparent;color:var(--blue);cursor:pointer;
  font:inherit;font-size:.82rem;font-weight:800;text-decoration:none;padding:0;
}
.form-link:hover{text-decoration:underline}
.status{
  display:none;margin-top:16px;padding:14px;border-radius:10px;font-size:.94rem;font-weight:700;line-height:1.45;
}
.status.show{display:block}
.status.ok{background:rgba(16,185,129,.13);border:1px solid rgba(16,185,129,.3);color:#047857}
.status.warn{background:rgba(245,130,10,.12);border:1px solid rgba(245,130,10,.28);color:#9a4b00}
.status.no{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.24);color:#b91c1c}
footer{padding:28px 6vw;border-top:1px solid var(--line);color:var(--muted);font-size:12px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}
footer a{color:var(--navy);text-decoration:none;font-weight:800}
@media(max-width:640px){
  .shell{width:min(100% - 32px,1180px)}
  .hero{min-height:100vh;grid-template-columns:1fr;gap:18px;align-content:start;align-items:start;padding:24px 0 34px}
  h1{font-size:2.65rem;line-height:.94}
  .hero-subhead{display:none}
  .auth-card{justify-self:stretch;padding:1.2rem}
  .button-row{flex-direction:column}
  button,.button{width:100%}
}
</style>
</head>
<body>
<main>
  <section class="hero shell">
    <div class="hero-heading">
      <h1><span>STRIVE</span> <em>Independence</em></h1>
      <p class="hero-subhead primary-copy">Create a new password for your STRIVE Independence account.</p>
      <p class="hero-subhead secondary-copy">After the update, sign in again with your new password.</p>
    </div>

    <div class="auth-card">
      <div class="card-kicker">Account security</div>
      <h2 class="card-title">Update Password</h2>
      <p class="card-copy">Enter and confirm your new password.</p>

      <form class="auth-form" id="updatePasswordForm">
        <div class="field">
          <label for="newPassword">New Password</label>
          <input id="newPassword" name="new_password" type="password" autocomplete="new-password" minlength="8" required>
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm New Password</label>
          <input id="confirmPassword" name="confirm_password" type="password" autocomplete="new-password" minlength="8" required>
        </div>
        <div class="button-row">
          <button class="primary" id="updatePasswordBtn" type="submit">Update Password</button>
          <a class="form-link" href="auth.html">Back to sign in</a>
        </div>
      </form>

      <div class="status" id="passwordStatus" role="status" aria-live="polite"></div>
    </div>
  </section>
</main>

<footer>
  <span>STRIVE INDEPENDENCE · Password update</span>
  <a href="auth.html">Back to sign in</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://ccfpdgmmwkghjszkbnzs.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_7Je2n19DYuDUUR-l9DQPCQ_ui1S17Ui';
const supabaseClient=SUPABASE_URL&&SUPABASE_ANON_KEY&&window.supabase
  ? window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY)
  : null;

const form=document.getElementById('updatePasswordForm');
const newPasswordInput=document.getElementById('newPassword');
const confirmPasswordInput=document.getElementById('confirmPassword');
const submitButton=document.getElementById('updatePasswordBtn');
const statusBox=document.getElementById('passwordStatus');

function showStatus(type,message){
  statusBox.className='status show '+type;
  statusBox.textContent=message;
}

form.addEventListener('submit',async event=>{
  event.preventDefault();

  if(!supabaseClient){
    showStatus('no','Supabase is not configured.');
    return;
  }

  const newPassword=newPasswordInput.value;
  const confirmPassword=confirmPasswordInput.value;

  if(newPassword.length<8){
    showStatus('no','Password must be at least 8 characters.');
    return;
  }

  if(newPassword!==confirmPassword){
    showStatus('no','Passwords do not match.');
    return;
  }

  submitButton.disabled=true;
  showStatus('warn','Updating password...');

  const { error }=await supabaseClient.auth.updateUser({ password:newPassword });

  if(error){
    submitButton.disabled=false;
    showStatus('no',error.message);
    return;
  }

  showStatus('ok','Password updated successfully. Please sign in with your new password.');
  await supabaseClient.auth.signOut();
  window.setTimeout(()=>{
    window.location.href='auth.html';
  },1200);
});
</script>
</body>
</html>
