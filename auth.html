<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Access | STRIVE INDEPENDENCE</title>
<meta name="description" content="Create or access your STRIVE INDEPENDENCE account for therapy teams, clinics, and care programs.">
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#132338;
  --ink:#1a2e44;
  --muted:rgba(26,46,68,.62);
  --soft:rgba(26,46,68,.78);
  --blue:#1B4FA8;
  --orange:#F5820A;
  --line:rgba(19,35,56,.12);
  --glass:rgba(255,255,255,.82);
  --white:#fff;
}
html{scroll-behavior:smooth}
body{
  min-height:100vh;font-family:'Outfit',sans-serif;color:var(--ink);
  background:#f5fafc;line-height:1.6;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 42% at 50% -10%,rgba(27,79,168,.14),transparent 64%),
    radial-gradient(ellipse 36% 34% at 95% 22%,rgba(245,130,10,.14),transparent 60%),
    radial-gradient(ellipse 44% 34% at 4% 82%,rgba(27,79,168,.08),transparent 58%);
}
main,footer{position:relative;z-index:1}
nav{
  position:relative;z-index:10;
  min-height:76px;display:flex;align-items:center;justify-content:space-between;
  padding:18px 6vw;border-bottom:1px solid var(--line);background:rgba(255,255,255,.82);
  backdrop-filter:blur(18px);
}
.brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--navy)}
.brand img{width:44px;height:44px;object-fit:contain}
.brand-word{display:block;font-size:20px;font-weight:900;letter-spacing:.09em;line-height:1;text-transform:uppercase}
.brand-sub{display:block;margin-top:2px;font-size:8px;font-weight:800;letter-spacing:.25em;color:var(--orange);text-transform:uppercase}
.shell{width:min(1180px,88vw);margin:0 auto}
.hero{
  min-height:calc(100vh - 76px);display:grid;grid-template-columns:.9fr 1.1fr;
  gap:48px;align-content:center;align-items:center;justify-items:stretch;padding:54px 0;
}
.hero-heading{text-align:left}
h1{
  max-width:560px;font-size:clamp(2.8rem,4.4vw,4.65rem);font-weight:900;line-height:.94;
  letter-spacing:0;text-transform:uppercase;color:var(--navy);margin:0;
}
h1 span{display:block}
h1 em{font-style:normal;color:var(--orange)}
.auth-card{
  width:min(100%,620px);
  justify-self:end;
  background:linear-gradient(145deg,rgba(255,255,255,.96),rgba(235,246,251,.96));
  border:1px solid rgba(27,79,168,.16);border-radius:20px;
  padding:clamp(1.35rem,3.4vw,2.3rem);
  box-shadow:0 34px 92px rgba(19,35,56,.16);
}
.card-kicker{
  font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.2em;
  text-transform:uppercase;color:var(--orange);margin-bottom:10px;
}
.card-title{
  font-size:clamp(1.65rem,3vw,2.35rem);font-weight:900;letter-spacing:0;
  line-height:1;text-transform:uppercase;color:var(--navy);margin-bottom:12px;
}
.card-copy{font-size:.98rem;color:var(--soft);line-height:1.62;margin-bottom:20px}
.card-copy:empty{display:none}
.auth-form{display:none;gap:16px}
.auth-form.active{display:grid}
.field-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
.field{display:grid;gap:9px}
label{
  font-family:'DM Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--orange);
}
input,select,textarea{
  width:100%;min-height:56px;border-radius:10px;border:1px solid rgba(19,35,56,.14);
  background:#fff;color:var(--navy);font:inherit;font-size:1.08rem;padding:0 16px;
}
.password-wrap{position:relative;display:flex;align-items:center}
.password-wrap input{padding-right:88px}
.password-toggle{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  min-height:34px;width:40px;padding:0;border-radius:7px;
  background:rgba(27,79,168,.07);border:1px solid rgba(19,35,56,.12);
  color:var(--blue);
  box-shadow:none;
}
.password-toggle:hover{transform:translateY(-50%);box-shadow:none}
.password-toggle svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.password-toggle .eye-off{display:none}
.password-toggle.is-visible .eye{display:none}
.password-toggle.is-visible .eye-off{display:block}
textarea{min-height:92px;resize:vertical;padding:14px 16px;line-height:1.45}
input:focus,select:focus,textarea:focus{outline:none;border-color:rgba(245,130,10,.58);box-shadow:0 0 0 4px rgba(245,130,10,.1)}
.form-link{
  justify-self:start;border:0;background:transparent;color:var(--blue);cursor:pointer;
  font:inherit;font-size:.82rem;font-weight:800;text-decoration:none;padding:0;
}
.form-link:hover{text-decoration:underline}
.forgot-link{margin-top:-4px;color:var(--muted);font-size:.74rem;font-weight:700}
.link-row{display:flex;flex-direction:column;align-items:flex-start;gap:3px;margin-top:-2px}
.button-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
button,.button{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:48px;
  padding:13px 20px;border-radius:6px;border:none;text-decoration:none;cursor:pointer;
  font-size:12.5px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;
  transition:opacity .2s,transform .2s,box-shadow .2s;
}
button:hover,.button:hover{opacity:.92;transform:translateY(-1px)}
.primary{background:var(--orange);color:var(--navy);box-shadow:0 14px 34px rgba(245,130,10,.22)}
.secondary{background:#fff;color:var(--navy);border:1px solid var(--line)}
.status{
  display:none;margin-top:16px;padding:14px;border-radius:10px;font-size:.94rem;font-weight:700;line-height:1.45;
}
.status.show{display:block}
.status.ok{background:rgba(16,185,129,.13);border:1px solid rgba(16,185,129,.3);color:#047857}
.status.warn{background:rgba(245,130,10,.12);border:1px solid rgba(245,130,10,.28);color:#9a4b00}
.status.no{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.24);color:#b91c1c}
footer{padding:28px 6vw;border-top:1px solid var(--line);color:var(--muted);font-size:12px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}
footer a{color:var(--navy);text-decoration:none;font-weight:800}
@media(max-width:640px){
  nav{min-height:58px;padding:9px 16px}
  .brand{gap:9px}
  .brand img{width:34px;height:34px}
  .brand-word{font-size:16px}
  .brand-sub{font-size:6.5px;letter-spacing:.2em}
  .shell{width:min(100% - 32px,1180px)}
  .hero{min-height:calc(100vh - 58px);grid-template-columns:1fr;gap:18px;align-content:start;align-items:start;padding:24px 0 34px}
  .hero-heading{text-align:left}
  h1{font-size:2.65rem;line-height:.94}
  .auth-card{justify-self:stretch;padding:1.2rem}
  .field-grid{grid-template-columns:1fr}
  .button-row{flex-direction:column}
  button,.button{width:100%}
  .form-link{justify-self:start;width:auto;font-size:.78rem}
  .link-row{gap:2px;margin-top:-7px}
}
</style>
</head>
<body>
<nav>
  <a class="brand" href="https://striveptlv.com/independence.html" aria-label="STRIVE INDEPENDENCE home">
    <img src="logo.png" alt="">
    <span>
      <span class="brand-word">STRIVE</span>
      <span class="brand-sub">Independence</span>
    </span>
  </a>
</nav>

<main>
  <section class="hero shell">
    <div class="hero-heading">
      <h1><span>STRIVE</span> <em>Independence</em></h1>
    </div>

    <div class="auth-card" id="account">
      <div class="card-kicker">Welcome</div>
      <h2 class="card-title" id="formTitle">Access Your Account</h2>
      <p class="card-copy" id="formCopy"></p>
      <form class="auth-form active" id="loginForm" data-title="Access Your Account" data-copy="" onsubmit="handleAuthSubmit(event,'login')">
        <div class="field">
          <label for="loginEmail">Work Email</label>
          <input id="loginEmail" name="email" type="email" placeholder="you@clinic.com" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" required>
        </div>
        <div class="button-row">
          <button class="primary" type="submit">Access Your Account</button>
          <button class="secondary" type="button" data-panel="createPractice">Create New Account</button>
        </div>
        <div class="link-row">
          <button class="form-link" type="button" data-panel="joinPractice">Join Existing Practice</button>
          <button class="form-link forgot-link" type="button" data-panel="forgot">Forgot your password?</button>
        </div>
      </form>

      <form class="auth-form" id="createPracticeForm" data-title="Create New Account" data-copy="Start a practice for yourself or your clinical team." onsubmit="handleAuthSubmit(event,'createPractice')">
        <div class="field-grid">
          <div class="field">
            <label for="practiceFullName">Full Name</label>
            <input id="practiceFullName" name="full_name" type="text" placeholder="Jane Smith" autocomplete="name" required>
          </div>
          <div class="field">
            <label for="practiceEmail">Work Email</label>
            <input id="practiceEmail" name="email" type="email" placeholder="jane@practice.com" autocomplete="email" required>
          </div>
          <div class="field">
            <label for="practicePassword">Password</label>
            <div class="password-wrap">
              <input id="practicePassword" name="password" type="password" placeholder="Create a password" autocomplete="new-password" minlength="8" required>
              <button class="password-toggle" type="button" data-toggle-password="practicePassword" aria-label="Show password" aria-pressed="false">
                <svg class="eye" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <svg class="eye-off" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3l18 18"></path><path d="M10.6 10.6A3 3 0 0 0 13.4 13.4"></path><path d="M9.9 4.4A10.6 10.6 0 0 1 12 4c6.5 0 10 8 10 8a18.4 18.4 0 0 1-3.1 4.2"></path><path d="M6.1 6.8C3.5 8.7 2 12 2 12s3.5 8 10 8a10.8 10.8 0 0 0 5.9-1.8"></path></svg>
              </button>
            </div>
          </div>
          <div class="field">
            <label for="practicePasswordConfirm">Confirm Password</label>
            <div class="password-wrap">
              <input id="practicePasswordConfirm" name="password_confirm" type="password" placeholder="Retype password" autocomplete="new-password" minlength="8" required>
              <button class="password-toggle" type="button" data-toggle-password="practicePasswordConfirm" aria-label="Show confirmed password" aria-pressed="false">
                <svg class="eye" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <svg class="eye-off" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3l18 18"></path><path d="M10.6 10.6A3 3 0 0 0 13.4 13.4"></path><path d="M9.9 4.4A10.6 10.6 0 0 1 12 4c6.5 0 10 8 10 8a18.4 18.4 0 0 1-3.1 4.2"></path><path d="M6.1 6.8C3.5 8.7 2 12 2 12s3.5 8 10 8a10.8 10.8 0 0 0 5.9-1.8"></path></svg>
              </button>
            </div>
          </div>
          <div class="field">
            <label for="practicePhone">Phone Number</label>
            <input id="practicePhone" name="phone" type="tel" placeholder="(555) 123-4567" autocomplete="tel" required>
          </div>
          <div class="field">
            <label for="clinicName">Clinic / Practice Name</label>
            <input id="clinicName" name="clinic_name" type="text" placeholder="Practice, clinic, or program name" autocomplete="organization" required>
          </div>
          <div class="field">
            <label for="practiceRole">Role</label>
            <select id="practiceRole" name="role" required>
              <option value="">Select role</option>
              <option value="owner">Owner</option>
              <option value="supervisor">Supervisor</option>
              <option value="therapist">Therapist</option>
            </select>
          </div>
          <div class="field">
            <label for="heardFrom">Where Did You Hear From Us?</label>
            <select id="heardFrom" name="heard_from" required>
              <option value="">Select source</option>
              <option value="linked_in">LinkedIn</option>
              <option value="instagram">Instagram</option>
              <option value="clinic">Clinic</option>
              <option value="friend">Friend</option>
            </select>
          </div>
        </div>
        <div class="button-row">
          <button class="primary" type="submit">Create New Account</button>
          <button class="secondary" type="button" data-panel="joinPractice">Join Existing Practice</button>
          <button class="form-link" type="button" data-panel="login">Back To Access</button>
        </div>
      </form>

      <form class="auth-form" id="joinPracticeForm" data-title="Join Existing Practice" data-copy="Use an invite code from your practice, supervisor, or team administrator. Your role will come from the invite later." onsubmit="handleAuthSubmit(event,'joinPractice')">
        <div class="field-grid">
          <div class="field">
            <label for="joinFullName">Full Name</label>
            <input id="joinFullName" name="full_name" type="text" placeholder="Jane Smith" autocomplete="name" required>
          </div>
          <div class="field">
            <label for="joinEmail">Work Email</label>
            <input id="joinEmail" name="email" type="email" placeholder="jane@practice.com" autocomplete="email" required>
          </div>
          <div class="field">
            <label for="joinPhone">Phone Number</label>
            <input id="joinPhone" name="phone" type="tel" placeholder="(555) 123-4567" autocomplete="tel" required>
          </div>
          <div class="field">
            <label for="teamCode">Team Code</label>
            <input id="teamCode" name="team_code" type="text" placeholder="A7K92Q" autocomplete="off" required>
          </div>
          <div class="field">
            <label for="joinPassword">Password</label>
            <div class="password-wrap">
              <input id="joinPassword" name="password" type="password" placeholder="Create a password" autocomplete="new-password" minlength="8" required>
              <button class="password-toggle" type="button" data-toggle-password="joinPassword" aria-label="Show password" aria-pressed="false">
                <svg class="eye" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <svg class="eye-off" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3l18 18"></path><path d="M10.6 10.6A3 3 0 0 0 13.4 13.4"></path><path d="M9.9 4.4A10.6 10.6 0 0 1 12 4c6.5 0 10 8 10 8a18.4 18.4 0 0 1-3.1 4.2"></path><path d="M6.1 6.8C3.5 8.7 2 12 2 12s3.5 8 10 8a10.8 10.8 0 0 0 5.9-1.8"></path></svg>
              </button>
            </div>
          </div>
          <div class="field">
            <label for="joinPasswordConfirm">Confirm Password</label>
            <div class="password-wrap">
              <input id="joinPasswordConfirm" name="password_confirm" type="password" placeholder="Retype password" autocomplete="new-password" minlength="8" required>
              <button class="password-toggle" type="button" data-toggle-password="joinPasswordConfirm" aria-label="Show confirmed password" aria-pressed="false">
                <svg class="eye" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <svg class="eye-off" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 3l18 18"></path><path d="M10.6 10.6A3 3 0 0 0 13.4 13.4"></path><path d="M9.9 4.4A10.6 10.6 0 0 1 12 4c6.5 0 10 8 10 8a18.4 18.4 0 0 1-3.1 4.2"></path><path d="M6.1 6.8C3.5 8.7 2 12 2 12s3.5 8 10 8a10.8 10.8 0 0 0 5.9-1.8"></path></svg>
              </button>
            </div>
          </div>
        </div>
        <div class="button-row">
          <button class="primary" type="submit">Join Practice</button>
          <button class="form-link" type="button" data-panel="login">Back To Access</button>
        </div>
      </form>

      <form class="auth-form" id="forgotForm" data-title="Forgot Password" data-copy="Enter your account email and STRIVE will send password reset instructions." onsubmit="handleAuthSubmit(event,'forgot')">
        <div class="field">
          <label for="resetEmail">Account Email</label>
          <input id="resetEmail" name="email" type="email" placeholder="account@clinic.com" autocomplete="email" required>
        </div>
        <div class="button-row">
          <button class="primary" type="submit">Send Reset Link</button>
          <button class="form-link" type="button" data-panel="login">Back To Access</button>
        </div>
      </form>

      <div class="status" id="authStatus" role="status" aria-live="polite"></div>
    </div>
  </section>
</main>

<footer>
  <span>STRIVE INDEPENDENCE · Account access</span>
  <a href="/index.html">Return to main site</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const panelTriggers=[...document.querySelectorAll('[data-panel]')];
const forms={
  login:document.getElementById('loginForm'),
  createPractice:document.getElementById('createPracticeForm'),
  joinPractice:document.getElementById('joinPracticeForm'),
  forgot:document.getElementById('forgotForm')
};
const formTitle=document.getElementById('formTitle');
const formCopy=document.getElementById('formCopy');
const statusBox=document.getElementById('authStatus');
const PLAN_PAGE="https://striveptlv.com/independence/choose-plan.html";
const SUPABASE_URL='https://ccfpdgmmwkghjszkbnzs.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_7Je2n19DYuDUUR-l9DQPCQ_ui1S17Ui';
const supabaseClient=SUPABASE_URL&&SUPABASE_ANON_KEY&&window.supabase
  ? window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY)
  : null;

function showPanel(panelName){
  Object.entries(forms).forEach(([name,form])=>{
    form.classList.toggle('active',name===panelName);
  });
  const activeForm=forms[panelName];
  formTitle.textContent=activeForm.dataset.title;
  formCopy.textContent=activeForm.dataset.copy;
  statusBox.className='status';
  statusBox.textContent='';
}

function showStatus(type,message){
  statusBox.className='status show '+type;
  statusBox.textContent=message;
}

panelTriggers.forEach(trigger=>{
  trigger.addEventListener('click',()=>{
    const panelName=trigger.dataset.panel;
    if(forms[panelName])showPanel(panelName);
  });
});

document.querySelectorAll("[data-toggle-password]").forEach(button => {
  button.addEventListener("click", () => {
    const input = document.getElementById(button.dataset.togglePassword);
    if (!input) return;
    const shouldShow = input.type === "password";
    input.type = shouldShow ? "text" : "password";
    button.classList.toggle("is-visible", shouldShow);
    button.setAttribute("aria-pressed", String(shouldShow));
    button.setAttribute("aria-label", shouldShow ? "Hide password" : "Show password");
  });
});

const initialPanelParam = new URLSearchParams(window.location.search).get("panel");
const initialHashPanel = window.location.hash ? window.location.hash.slice(1) : "";
const initialPanel = initialPanelParam || initialHashPanel;
if (initialPanel && forms[initialPanel]) {
  showPanel(initialPanel);
}

function getFormData(form){
  return Object.fromEntries(new FormData(form).entries());
}

function passwordsMatch(data) {
  return data.password === data.password_confirm;
}

function wait(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function updateProfileAfterSignup(userId, profileDetails) {
  const updateProfile = () => supabaseClient
    .from("profile")
    .update(profileDetails)
    .eq("user_id", userId)
    .select("user_id")
    .maybeSingle();

  const firstAttempt = await updateProfile();

  if (!firstAttempt.error && firstAttempt.data) {
    return firstAttempt;
  }

  await wait(750);
  const secondAttempt = await updateProfile();

  if (secondAttempt.error || secondAttempt.data) {
    return secondAttempt;
  }

  return {
    error: new Error("Profile row was not ready. Please try logging in again.")
  };
}

async function handleAuthSubmit(event, type) {
  event.preventDefault();

  const form = event.currentTarget;
  const data = getFormData(form);

  try {
    // -----------------------------
    // LOGIN
    // -----------------------------
    if (type === "login") {
      const { email, password } = data;

      showStatus("warn", "Logging in...");

      const { data: loginData, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        showStatus("no", error.message);
        return;
      }

      console.log("Supabase login data", loginData);
      showStatus("ok", "Logged in successfully. Taking you to plan selection...");
      window.location.href = PLAN_PAGE;

      return;
    }

    // -----------------------------
    // CREATE PRACTICE / NEW ACCOUNT
    // For solo practitioners, owners, supervisors,
    // or the first user creating a practice/team.
    // -----------------------------
    if (type === "createPractice") {
      const {
        full_name,
        email,
        phone,
        clinic_name,
        role,
        password,
        password_confirm,
        heard_from
      } = data;

      if (!passwordsMatch({ password, password_confirm })) {
        showStatus("no", "Passwords do not match. Please retype your password.");
        return;
      }

      showStatus("warn", "Creating your account...");

      // 1. Create Supabase Auth user
      const { data: signupData, error: signupError } = await supabaseClient.auth.signUp({
        email,
        password,
        options: {
          data: {
            full_name,
            phone,
            clinic_name,
            role,
            heard_from
          }
        }
      });

      if (signupError) {
        showStatus("no", signupError.message);
        return;
      }

      const user = signupData.user;

      if (!user) {
        showStatus("warn", "Account created. Please check your email to confirm your account.");
        return;
      }

      // 2. Update profile details created by the database trigger
      const { error: profileError } = await updateProfileAfterSignup(user.id, {
        full_name,
        clinic_name,
        role
      });

      if (profileError) {
        showStatus("no", "Account created, but profile setup failed: " + profileError.message);
        return;
      }

      // 3. Create practice/team
      // Solo practitioners still get a team with one member.
      const teamId = crypto.randomUUID();

      const { error: teamError } = await supabaseClient
        .from("teams")
        .insert({
          id: teamId,
          name: clinic_name
        });

      if (teamError) {
        showStatus("no", "Profile updated, but practice setup failed: " + teamError.message);
        return;
      }

      // 4. Connect user to team as owner/supervisor
      const { error: memberError } = await supabaseClient
        .from("members")
        .insert({
          team_id: teamId,
          user_id: user.id,
          role
        });

      if (memberError) {
        showStatus("no", "Practice created, but membership setup failed: " + memberError.message);
        return;
      }

      showStatus("ok", "Account and practice created successfully. Taking you to plan selection...");
      window.location.href = PLAN_PAGE;
      return;
    }

    // -----------------------------
    // JOIN EXISTING PRACTICE
    // Uses teams.team_code
    // -----------------------------
    if (type === "joinPractice") {
      const {
        full_name,
        email,
        phone,
        team_code,
        password,
        password_confirm
      } = data;

      if (!passwordsMatch({ password, password_confirm })) {
        showStatus("no", "Passwords do not match. Please retype your password.");
        return;
      }

      const cleanTeamCode = team_code.trim().toUpperCase();

      showStatus("warn", "Checking team code...");

      // 1. Look up team by team code
      const { data: teamData, error: teamError } = await supabaseClient
        .from("teams")
        .select("id, name, team_code, plan, max_users, subscription_status")
        .eq("team_code", cleanTeamCode)
        .maybeSingle();

      if (teamError) {
        showStatus("no", "Team lookup failed: " + teamError.message);
        return;
      }

      if (!teamData) {
        showStatus("no", "Invalid team code. Please check the code and try again.");
        return;
      }

      // 2. Optional: block if team is not active/trialing
      if (
        teamData.subscription_status &&
        !["trialing", "active"].includes(teamData.subscription_status)
      ) {
        showStatus("no", "This team is not currently active. Please contact your team owner.");
        return;
      }

      // 3. Count current team members
      const { count: memberCount, error: countError } = await supabaseClient
        .from("members")
        .select("*", { count: "exact", head: true })
        .eq("team_id", teamData.id);

      if (countError) {
        showStatus("no", "Could not check team member limit: " + countError.message);
        return;
      }

      // 4. Block if team is full
      if (teamData.max_users && memberCount >= teamData.max_users) {
        showStatus("no", "This team has reached its user limit.");
        return;
      }

      showStatus("warn", "Creating your account...");

      // 5. Create Supabase Auth user
      const { data: signupData, error: signupError } = await supabaseClient.auth.signUp({
        email,
        password,
        options: {
          data: {
            full_name,
            phone,
            team_code: cleanTeamCode,
            role: "member"
          }
        }
      });

      if (signupError) {
        showStatus("no", signupError.message);
        return;
      }

      const user = signupData.user;

      if (!user) {
        showStatus("warn", "Account created. Please check your email to confirm your account.");
        return;
      }

      // 6. Update profile details created by the database trigger
      const { error: profileError } = await updateProfileAfterSignup(user.id, {
        full_name,
        clinic_name: teamData.name,
        role: "member"
      });

      if (profileError) {
        showStatus("no", "Account created, but profile setup failed: " + profileError.message);
        return;
      }

      // 7. Add user to team
      const { error: memberError } = await supabaseClient
        .from("members")
        .insert({
          team_id: teamData.id,
          user_id: user.id,
          role: "member"
        });

      if (memberError) {
        showStatus("no", "Profile updated, but team membership failed: " + memberError.message);
        return;
      }

      showStatus("ok", "Account created and joined to team successfully.");

      // 8. Send to plan selection
      window.location.href = PLAN_PAGE;
      return;
    }

    // -----------------------------
    // FORGOT PASSWORD
    // -----------------------------
    if (type === "forgot") {
      const { email } = data;

      showStatus("warn", "Sending password reset email...");

      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + "/update-password.html"
      });

      if (error) {
        showStatus("no", error.message);
        return;
      }

      showStatus("ok", "Password reset email sent. Check your inbox.");
      form.reset();
      return;
    }

    showStatus("no", "Unknown form type.");
  } catch (err) {
    console.error(err);
    showStatus("no", "Something went wrong. Please try again.");
  }
}

</script>
</body>
</html>
